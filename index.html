<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Birthday Ayesha ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

/* NETFLIX INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#intro h1{
color:#ff4da6;
font-size:60px;
letter-spacing:8px;
animation:zoom 3s forwards;
}

@keyframes zoom{
0%{transform:scale(0);opacity:0}
50%{transform:scale(1.2)}
100%{transform:scale(1);opacity:1}
}

/* GALAXY BACKGROUND */

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
background:black;
}

.star{
position:fixed;
width:2px;
height:80px;
background:linear-gradient(white,transparent);
animation:shoot 4s linear infinite;
}

@keyframes shoot{
0%{transform:translateY(-100px) translateX(0)}
100%{transform:translateY(100vh) translateX(200px)}
}

.header{
font-size:32px;
margin-top:20px;
text-shadow:0 0 20px pink;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
margin:20px auto;
width:90%;
max-width:500px;
border-radius:20px;
box-shadow:0 0 20px #ff4da6;
}

/* 3D CAROUSEL */

.carousel{
width:220px;
height:260px;
margin:40px auto;
position:relative;
transform-style:preserve-3d;
animation:rotate 25s linear infinite;
}

.carousel img{
position:absolute;
width:200px;
height:260px;
left:10px;
top:0;
border-radius:15px;
object-fit:cover;
box-shadow:0 0 20px pink;
cursor:pointer;
}

@keyframes rotate{
from{transform:rotateY(0)}
to{transform:rotateY(360deg)}
}

/* HEART */

.heart{
position:fixed;
color:pink;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* ROADMAP */

.love-map{
position:relative;
width:300px;
height:300px;
margin:30px auto;
}

.road{
position:absolute;
top:50%;
left:50%;
width:240px;
height:240px;
margin-left:-120px;
margin-top:-120px;
border:3px dashed pink;
border-radius:50%;
}

.milestone{
position:absolute;
width:50px;
height:50px;
background:pink;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* ENVELOPE */

.envelope{
background:pink;
padding:15px 30px;
border-radius:10px;
cursor:pointer;
margin:auto;
width:160px;
}

/* PROPOSAL */

#proposal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:30px;
border-radius:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:pink;
color:white;
margin:10px;
}

</style>

</head>

<body>

<!-- INTRO -->

<div id="intro">
<h1>AYESHA</h1>
</div>

<h1 class="header">Happy Birthday Ayesha ❤️</h1>

<div class="card">

<h3>Loving You Since</h3>

<div id="love"></div>

</div>

<!-- 3D CAROUSEL -->

<div class="carousel" id="carousel"></div>

<!-- ROADMAP -->

<div class="card">

<h2>Our Journey ❤️</h2>

<div class="love-map">

<div class="road"></div>

</div>

</div>

<!-- ENVELOPE -->

<div class="card">

<h3>Secret Letter</h3>

<div class="envelope" onclick="window.location='letter.html'">
Open Letter
</div>

</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<!-- PROPOSAL -->

<div id="proposal">

<div class="box">

<h2>Will You Marry Me ❤️</h2>

<button onclick="yes()">Yes</button>
<button onclick="closeP()">Later</button>

</div>

</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script>

/* INTRO REMOVE */

setTimeout(()=>{
document.getElementById("intro").style.display="none"
},3000)

/* SHOOTING STARS */

for(let i=0;i<20;i++){

let s=document.createElement("div")

s.className="star"

s.style.left=Math.random()*100+"vw"

s.style.animationDelay=Math.random()*5+"s"

document.body.appendChild(s)

}

/* LOVE COUNTER */

let start=new Date("2018-06-19")

setInterval(()=>{

let now=new Date()

let d=Math.floor((now-start)/(1000*60*60*24))

document.getElementById("love").innerHTML=d+" days ❤️"

},1000)

/* HEARTS */

setInterval(()=>{

let h=document.createElement("div")

h.className="heart"

h.innerHTML="❤️"

h.style.left=Math.random()*100+"vw"

document.body.appendChild(h)

setTimeout(()=>h.remove(),6000)

},500)

/* 3D CAROUSEL */

const carousel=document.getElementById("carousel")

const total=50

const deg=360/total

for(let i=1;i<=total;i++){

let img=document.createElement("img")

img.src=i+".jpg"

img.style.transform=`rotateY(${i*deg}deg) translateZ(400px)`

img.onclick=()=>{

modal.style.display="flex"

modalImg.src=img.src

}

carousel.appendChild(img)

}

/* MODAL */

const modal=document.getElementById("modal")
const modalImg=document.getElementById("modalImg")

modal.onclick=()=>modal.style.display="none"

/* ROADMAP */

const years=[2018,2019,2020,2021,2022,2023,2024,2025]

const map=document.querySelector(".love-map")

const r=110

years.forEach((y,i)=>{

let angle=(i/years.length)*2*Math.PI

let x=150+r*Math.cos(angle)-25

let yPos=150+r*Math.sin(angle)-25

let div=document.createElement("div")

div.className="milestone"

div.innerHTML=y

div.style.left=x+"px"

div.style.top=yPos+"px"

div.onclick=()=>{

modal.style.display="flex"

modalImg.src=(i*6+1)+".jpg"

}

map.appendChild(div)

})

/* CONFETTI */

setTimeout(()=>{
confetti({particleCount:200,spread:120})
},4000)

/* PROPOSAL */

setTimeout(()=>{

document.getElementById("proposal").style.display="flex"

},8000)

function yes(){

alert("She said YES ❤️💍")

}

function closeP(){

document.getElementById("proposal").style.display="none"

}

/* MUSIC */

document.body.onclick=()=>{

document.getElementById("music").play()

}

</script>

</body>
</html>
