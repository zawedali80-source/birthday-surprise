<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Birthday Ayesha ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
perspective:1200px;
}

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#intro h1{
color:#ff4da6;
font-size:50px;
letter-spacing:8px;
animation:zoom 3s forwards;
}

@keyframes zoom{
0%{transform:scale(0)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.header{
font-size:28px;
margin-top:20px;
text-shadow:0 0 20px pink;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
margin:20px auto;
width:90%;
max-width:500px;
}

#typing{
color:pink;
min-height:30px;
}

/* HEARTS */

.heart{
position:fixed;
color:pink;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* 3D CAROUSEL */

.carousel {
  width: 300px;
  height: 400px;
  margin: 60px auto;
  perspective: 1200px;
  position: relative;
  overflow: hidden;
  border-radius: 15px;
  box-shadow: 0 0 40px rgba(255,105,180,0.5);
  background: black;
}

.carousel-img {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  object-fit: cover;
  border-radius: 15px;
  opacity: 0;
  transform: rotateY(20deg) scale(0.95);
  transition: opacity 1s ease, transform 1s ease;
  cursor: pointer;
}
.carousel-img.active {
  opacity: 1;
  transform: rotateY(0deg) scale(1);
  z-index: 1;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* ROADMAP */

.love-map{
position:relative;
width:260px;
height:260px;
margin:30px auto;
}

.road{
position:absolute;
top:50%;
left:50%;
width:200px;
height:200px;
margin-left:-100px;
margin-top:-100px;
border:3px dashed pink;
border-radius:50%;
}

.milestone{
position:absolute;
width:40px;
height:40px;
background:pink;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
cursor:pointer;
}

/* ENVELOPE */

.envelope{
background:pink;
padding:15px 30px;
border-radius:10px;
cursor:pointer;
margin:auto;
width:160px;
}

/* PROPOSAL */

#proposal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:30px;
border-radius:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:pink;
color:white;
margin:10px;
}

/* CAKE */

#cake{
display:none;
font-size:60px;
margin-top:20px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}
@media(max-width:600px){
  /* Header smaller on mobile */
  .header { font-size:24px; }

  /* Card adjustments */
  .card {
    width:95%;
    padding:15px;
    margin:15px auto;
  }

  /* Typing text smaller */
  #typing { font-size:16px; }

  /* Carousel smaller */
  .carousel { width:90%; height:250px; }
  .carousel-img { border-radius:12px; }

  /* Envelope smaller */
  .envelope { width:150px; padding:12px 25px; }

  /* Love map smaller */
  .love-map { width:180px; height:180px; }
  .road { width:140px; height:140px; margin-left:-70px; margin-top:-70px; }
  .milestone { width:35px; height:35px; font-size:12px; }

  /* Cake emoji smaller */
  #cake { font-size:70px; }

  /* Hearts smaller */
  .heart { font-size:14px; }

  /* Intro H1 smaller */
  #intro h1 { font-size:50px; letter-spacing:5px; }

  /* Modal image max size */
  .modal img { max-width:95%; max-height:80%; }

  /* Proposal box smaller */
  #proposal .box { padding:20px; width:90%; }
  button { padding:8px 16px; font-size:14px; }
}
</style>

</head>

<body>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script>

/* INTRO */

setTimeout(()=>{
document.getElementById("intro").style.display="none"
},3000)

/* LOVE COUNTER */

let start=new Date("2018-06-19")

setInterval(()=>{
let now=new Date()
let d=Math.floor((now-start)/(1000*60*60*24))
document.getElementById("love").innerHTML=d+" days ❤️"
},1000)

/* TYPING */

const text="You are the most beautiful part of my life ❤️"
let t=0

function typing(){
if(t<text.length){
document.getElementById("typing").innerHTML+=text.charAt(t)
t++
setTimeout(typing,80)
}
}

typing()

/* HEARTS */

setInterval(()=>{
let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"
h.style.left=Math.random()*100+"vw"
document.body.appendChild(h)
setTimeout(()=>h.remove(),6000)
},500)

/* 3D CAROUSEL */


const carouselImages = document.querySelectorAll('.carousel-img');
let currentIndex = 0;

function showNext() {
  carouselImages.forEach((img, idx) => img.classList.remove('active'));
  carouselImages[currentIndex].classList.add('active');
  currentIndex = (currentIndex + 1) % carouselImages.length;
}

// click to open modal
carouselImages.forEach(img => {
  img.addEventListener('click', () => {
    modal.style.display = 'flex';
    modalImg.src = img.src;
  });
});

// start carousel
showNext();
setInterval(showNext, 3000);
/* MODAL */

const modal=document.getElementById("modal")
const modalImg=document.getElementById("modalImg")

modal.onclick=()=>modal.style.display="none"

/* ROADMAP */

const years=[2018,2019,2020,2021,2022,2023,2024,2025]

const map=document.querySelector(".love-map")

const r=90
const milestoneImages = [
  "9289.jpg",
  "9812.jpg",
  "9956.jpg",
  "10145.jpg",
  "10254.jpg",
  "10307.jpg",
  "98.jpeg",
  "99.jpeg"
];

years.forEach((y,i)=>{

let angle=(i/years.length)*2*Math.PI

let x=130+r*Math.cos(angle)-20
let yPos=130+r*Math.sin(angle)-20

let div=document.createElement("div")

div.className="milestone"
div.innerHTML=y

div.style.left=x+"px"
div.style.top=yPos+"px"

div.onclick=()=>{
modal.style.display="flex"
 modalImg.src = milestoneImages[i];
} 

map.appendChild(div)

})

/* CONFETTI */

setTimeout(()=>{
confetti({particleCount:200,spread:120})
},4000)

/* PROPOSAL */

setTimeout(()=>{
document.getElementById("proposal").style.display="flex"
},8000)

/* YES */

function yes(){
document.getElementById("proposal").style.display="none"
document.getElementById("cake").style.display="block"
confetti({particleCount:400,spread:180})
}

/* CLOSE */

function closeP(){
document.getElementById("proposal").style.display="none"
}

/* MUSIC */

document.body.onclick=()=>{
document.getElementById("music").play()
}

</script>
