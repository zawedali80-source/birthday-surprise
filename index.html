```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Birthday Ayesha ❤️</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: radial-gradient(circle at top,#2b001f,#0b0014,#000);
color:white;
text-align:center;
overflow-x:hidden;
}

.header{
font-size:36px;
font-weight:bold;
margin-top:20px;
text-shadow:0 0 20px #ff77bf;
}

.sub{margin-bottom:25px;}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
margin:20px auto;
max-width:450px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 25px rgba(255,77,166,0.25);
}

/* CAROUSEL */

.carousel{
width:100%;
height:260px;
overflow:hidden;
position:relative;
}

.carousel-track{
display:flex;
justify-content:center;
align-items:center;
transition:transform .5s;
}

.carousel-track img{
flex:0 0 auto;
width:200px;
height:300px;
margin:0 10px;
border-radius:14px;
object-fit:cover;
box-shadow:0 0 20px rgba(255,77,166,0.6);
cursor:pointer;
transition:.3s;
}

.carousel-track img.active{
transform:scale(1.3);
z-index:1000;
}

/* LOVE ROADMAP */

.love-map{
position:relative;
width:400px;
height:400px;
margin:30px auto;
}

.road-path{
position:absolute;
top:50%;
left:50%;
width:320px;
height:320px;
margin-left:-160px;
margin-top:-160px;
border-radius:50%;
border:3px dashed #ff4da6;
box-shadow:0 0 20px #ff77bf;
}

.milestone{
position:absolute;
width:60px;
height:60px;
background:linear-gradient(45deg,#ff4da6,#ff77bf);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 0 15px #ff77bf;
font-size:12px;
}

/* HEARTS */

.heart{
position:fixed;
color:#ff77bf;
animation:float 6s linear infinite;
font-size:20px;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* MESSAGE */

.message{
font-size:16px;
line-height:1.7;
white-space:pre-line;
text-shadow:0 0 6px #ff77bf;
}

/* ENVELOPE */

.envelope{
margin-top:15px;
width:140px;
height:50px;
border-radius:10px;
background:linear-gradient(45deg,#ff4da6,#ff77bf);
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff77bf;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin:auto;
}

/* IMAGE MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
z-index:1000;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:12px;
}

/* PROPOSAL */

#proposal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.proposal-box{
background:#111;
padding:30px;
border-radius:20px;
box-shadow:0 0 30px #ff4da6;
text-align:center;
}

button{
background:#ff4da6;
border:none;
padding:10px 20px;
margin:10px;
border-radius:10px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">Happy Birthday Rafat ❤️</div>

<div class="sub">
<h3>❤️ Loving You Since</h3>
<div id="loveTime"></div>
</div>

<!-- CAROUSEL -->

<div class="card">
<h2 class="text-xl text-pink-400 mb-4">Our Memories ❤️</h2>

<div class="carousel">
<div class="carousel-track" id="carouselTrack">

<img src="1a.jpg">
<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">
<img src="4.jpg">
<img src="5.jpg">

</div>
</div>
</div>

<!-- LOVE ROADMAP -->

<div class="card">
<h2 class="text-xl text-pink-400 mb-4">Our 7 Year Journey ❤️</h2>

<div class="love-map">
<div class="road-path"></div>
</div>
</div>

<!-- MESSAGE -->

<div class="card">
<div class="message" id="type"></div>
</div>

<!-- LETTER -->

<div class="card">
<h3>💌 Secret Letter</h3>

<div class="envelope" onclick="window.location.href='letter.html'">
Open Letter
</div>
</div>

<!-- IMAGE MODAL -->

<div class="modal" id="modal">
<img id="modalImg">
</div>

<!-- PROPOSAL -->

<div id="proposal">
<div class="proposal-box">

<h2 style="font-size:26px;margin-bottom:20px;">
Ayesha ❤️<br>Will You Marry Me?
</h2>

<button onclick="acceptLove()">Yes ❤️</button>
<button onclick="closeProposal()">Later</button>

</div>
</div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* FIREWORKS */

setTimeout(()=>{
confetti({particleCount:200,spread:120,origin:{y:.6}})
},1500)

/* LOVE COUNTER */

let start=new Date("2018-06-19")

setInterval(()=>{
let now=new Date()
let days=Math.floor((now-start)/(1000*60*60*24))
document.getElementById("loveTime").innerHTML=days+" days ❤️"
},1000)

/* FLOAT HEARTS */

function heart(){
let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"
h.style.left=Math.random()*100+"vw"
document.body.appendChild(h)
setTimeout(()=>h.remove(),6000)
}

setInterval(heart,500)

/* TYPING MESSAGE */

let text=`From our teenage chaos to who we are today…
We argued, cried, even walked away more than once.
Yet somehow our love always found its way back.
7 years later, my heart still chooses only you, Ayesha. ❤️`

let n=0

function typing(){
if(n<text.length){
document.getElementById("type").innerHTML+=text.charAt(n)
n++
setTimeout(typing,60)
}
}

typing()

/* CAROUSEL */

const track=document.getElementById("carouselTrack")
const images=track.querySelectorAll("img")

let index=0

function updateCarousel(){

images.forEach(img=>img.classList.remove("active"))
images[index].classList.add("active")

index++
if(index>=images.length)index=0

}

updateCarousel()
setInterval(updateCarousel,3500)

/* IMAGE POPUP */

const modal=document.getElementById("modal")
const modalImg=document.getElementById("modalImg")

images.forEach(img=>{
img.onclick=()=>{
modal.style.display="flex"
modalImg.src=img.src
}
})

modal.onclick=()=>modal.style.display="none"

/* LOVE ROADMAP */

const milestones=[
{year:"2018",img:"9624.jpg"},
{year:"2019",img:"9812.jpg"},
{year:"2020",img:"9956.jpg"},
{year:"2021",img:"11252.jpg"},
{year:"2022",img:"10145.webp"},
{year:"2023",img:"10254.webp"},
{year:"2024",img:"30559.jpg"},
{year:"2025",img:"IMG_9880.jpeg"}
]

const map=document.querySelector(".love-map")
const radius=150

milestones.forEach((m,i)=>{

const angle=(i/milestones.length)*2*Math.PI
const x=200+radius*Math.cos(angle)-30
const y=200+radius*Math.sin(angle)-30

const div=document.createElement("div")

div.className="milestone"
div.style.left=x+"px"
div.style.top=y+"px"

div.innerHTML=m.year
div.dataset.img=m.img

map.appendChild(div)

})

document.addEventListener("click",function(e){

if(e.target.classList.contains("milestone")){
modal.style.display="flex"
modalImg.src=e.target.dataset.img
}

})

/* PROPOSAL */

setTimeout(()=>{
document.getElementById("proposal").style.display="flex"
},6000)

function closeProposal(){
document.getElementById("proposal").style.display="none"
}

function acceptLove(){
alert("She said YES ❤️💍")
}

/* MUSIC PLAY ON FIRST TAP */

const bgMusic = document.getElementById("bgMusic");

document.body.addEventListener("click",function(){
bgMusic.play();
},{once:true})

</script>

</body>
</html>
